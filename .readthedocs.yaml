# Read the Docs build configuration.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

# Install the package itself (so autodoc can import `shinobi`) plus the
# documentation toolchain. Keep docs/requirements.txt in sync with the `docs`
# dependency group in pyproject.toml.
python:
  install:
    - method: pip
      path: .
    - requirements: docs/requirements.txt
