name: dosho watch

# Daily monitor of shinobi-dosho/dosho main branch. Opens an issue here when
# there are new commits, tags, or releases, classified by conventional-commit
# markers, and runs the CI tests (--group dev) against dosho@main to surface
# obvious breakage. 00:00 SAST == 22:00 UTC.
on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out stimela-ninja
        uses: actions/checkout@v4
        with:
          path: stimela-ninja

      - name: Clone dosho
        run: git clone --filter=blob:none https://github.com/shinobi-dosho/dosho dosho

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build digest, run CI tests, open issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash stimela-ninja/.github/scripts/dosho-watch.sh
