[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ninja-fm"
version = "0.1.0.dev0"
description = "Stimela 3.0 -- a functional, flexible, and simple framework for reproducible radio astronomy pipelines"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Sphesihle Makhathini", email = "a0069067@wits.ac.za" },
]
dependencies = [
    "pydantic>=2.6",
    "pydantic-settings>=2.2",
    "pyyaml>=6.0",
    "click>=8.1",
    "rich>=13.7",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.5",
]

[project.scripts]
ninja = "shinobi.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/shinobi"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
