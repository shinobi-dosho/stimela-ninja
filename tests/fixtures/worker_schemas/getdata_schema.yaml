name: getdata
info: Download and/or convert/unarchive data so that it is in the measurement set
  (MS) format for further processing.
inputs:
  dataid:
    required: true
    info: Basename of MS. For MeerKAT data to be downloaded by CARACal, this should
      be the data ID of the observation.
    dtype: List[str]
  extension:
    dtype: str
    info: Extension of raw (input) visibility data
    required: false
    default: ms
  untar:
    enable:
      dtype: bool
      info: Enable the 'untar' segment.
      required: false
      default: true
    tar_options:
      dtype: str
      info: The tar options to pass to the 'tar' command.
      required: false
      default: -xvf
  report:
    dtype: bool
    required: false
    info: (Re)generate a full HTML report at the end of this worker.
    default: true
  ignore_missing:
    dtype: bool
    required: false
    info: Ignore missing matches/files in the dataid list and proceed with the files
      that were found. If none can be found, an exception will be raised refardless.
    default: true
  cabs:
    name:
      dtype: str
      required: true
    version:
      dtype: str
      required: false
    tag:
      dtype: str
      required: false
